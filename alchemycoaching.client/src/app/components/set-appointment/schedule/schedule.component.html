<div class="schedule-container">
  <div class="background-layer" aria-hidden="true"></div>
  <div class="overlay-layer" aria-hidden="true"></div>

  <div class="schedule-content">
    <div class="schedule-header">
      <div class="title display-font">{{ titleText }}</div>
    </div>

    <div class="description-panel">
      <div class="content-card default-font panel-card">
        <p>
          {{ contentText }}
        </p>
      </div>
    </div>

    <div class="calendar-panel">
      <app-date-picker (dateSelected)="onDateSelected($event)"></app-date-picker>
    </div>

    <div class="time-panel">
      <app-time-picker [selectedDate]="selectedDate"></app-time-picker>
    </div>
  </div>
</div>
